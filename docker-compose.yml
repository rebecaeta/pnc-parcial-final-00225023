version: '3.8'

services:
  app:
    build: .
    container_name: hotel-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hotel_db
      SPRING_DATASOURCE_USERNAME: hotel_user
      SPRING_DATASOURCE_PASSWORD: hotel_pass
      JWT_SECRET: change-this-secret-in-production-1234567890
    depends_on:
      - db
    networks:
      - hotel-network

  db:
    image: postgres:16
    container_name: hotel-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-network

networks:
  hotel-network:
    driver: bridge

